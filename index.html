<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>H@CKED BY Sh@dow</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Great+Vibes&family=Cinema+Decorative:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #000;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle at center, #021a0a 0%, #000000 100%);
      display: block;
    }

    .content-wrapper {
      position: relative;
      width: 92%;
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      z-index: 10;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(4px);
      padding: 40px 24px;
      border-radius: 40px;
      border: 1px solid rgba(255, 40, 40, 0.7);
      box-shadow: 0 0 35px rgba(255, 0, 0, 0.35);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .kalema {
      width: 240px;
      max-width: 75%;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 12px #ff3b3b);
      display: block;
    }

    .logo-container {
      display: block;
      margin: 0 0 20px 0;
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ff2a2a;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
      animation: softGlowPulse 2.2s infinite alternate;
      display: block;
    }

    @keyframes softGlowPulse {
      0% { box-shadow: 0 0 5px #ff4d4d, 0 0 10px #ff0000; border-color: #ff4444; }
      100% { box-shadow: 0 0 25px #ff0000, 0 0 35px #ff6600; border-color: #ff8800; }
    }

    .hacked-text {
      font-family: 'Inter';
      font-size: 2.8rem;
      background: linear-gradient(135deg, #ff4d4d, #ffb347, #ff4d4d);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.9), 0 0 8px rgba(255, 200, 0, 0.6);
      font-weight: 900;
      letter-spacing: 3px;
      margin: 0 0 12px 0;
      animation: shineText 3s linear infinite;
      transform-origin: center;
      display: inline-block;
      padding: 0 10px;
    }

    @keyframes shineText {
      0% { background-position: 0% 50%; text-shadow: 0 0 10px #ff0000; }
      50% { background-position: 100% 50%; text-shadow: 0 0 28px #ff6600, 0 0 12px #ff0000; }
      100% { background-position: 0% 50%; text-shadow: 0 0 10px #ff0000; }
    }

    .glow-quote {
      font-style: italic;
      text-align: center;
      color: #ffd966;
      background: #1a0000aa;
      padding: 12px;
      border-radius: 24px;
      margin-top: 20px;
      font-weight: 500;
      border: 1px dashed #ff6666;
      font-family: 'Montserrat', sans-serif;
    }

    @media (max-width: 550px) {
      .content-wrapper { padding: 30px 18px; }
      .logo { width: 110px; height: 110px; }
      .hacked-text { font-size: 1.9rem; letter-spacing: 1px; }
      .kalema { width: 180px; }
    }
  </style>
</head>
<body>

  <canvas id="matrixCanvas"></canvas>

  <div class="content-wrapper">
    <img src="https://i.ibb.co.com/MdyBkYh/1776880906546.png" alt="Kalema symbol" class="kalema">
    
    <div class="logo-container">
      <img src="https://i.ibb.co.com/SDt1fHX9/logo.png" alt="Sh@dow-Logo" class="logo">
    </div>
    
    <div class="hacked-text">HACKED BY Sh@dow</div>
    
    <div class="glow-quote">
      “A single hour of reflection is better than a lifetime of heedlessness.”
    </div>
  </div>

  <audio id="myAudio" loop preload="auto">
    <source src="https://files.catbox.moe/wqaqua.m4a" type="audio/mp4">
  </audio>

  <script>
    (function() {
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      
      let width = window.innerWidth;
      let height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      
      const fontSize = 18;
      const columnWidth = 22;      
      const columns = Math.floor(width / columnWidth);
      const drops = new Array(columns).fill().map(() => Math.floor(Math.random() * -height));

      const matrixChars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!@#$%&";
      
      function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.045)";
        ctx.fillRect(0, 0, width, height);
        
        ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
        
        for (let i = 0; i < drops.length; i++) {
          const randomChar = matrixChars[Math.floor(Math.random() * matrixChars.length)];
          const intensity = Math.random() > 0.85 ? "#ff3a3a" : "#2eff8c";
          ctx.fillStyle = intensity;
          const x = i * columnWidth;
          const y = drops[i] * fontSize;
          ctx.fillText(randomChar, x, y);
          
          if (y > height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
        requestAnimationFrame(drawMatrix);
      }

      window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        const newColumns = Math.floor(width / columnWidth);
        drops.length = newColumns;
        for (let i = 0; i < newColumns; i++) {
          if (drops[i] === undefined) drops[i] = Math.floor(Math.random() * -height);
        }
      });
      
      drawMatrix();
     
      const audio = document.getElementById("myAudio");
      let audioPlayed = false;
      
      function playMusic() {
        if (!audioPlayed) {
          audio.play().then(() => {
            audioPlayed = true;
          }).catch(() => {});
        }
      }
      
      document.body.addEventListener("click", playMusic, { once: true });
      document.body.addEventListener("touchstart", playMusic, { once: true });
      document.addEventListener("keydown", playMusic, { once: true });
      
      const wrapper = document.querySelector('.content-wrapper');
      if (wrapper) {
        setInterval(() => {
          if (Math.random() > 0.85) {
            wrapper.style.boxShadow = '0 0 30px rgba(255, 40, 40, 0.7)';
            setTimeout(() => {
              wrapper.style.boxShadow = '0 0 35px rgba(255, 0, 0, 0.35)';
            }, 300);
          }
        }, 2800);
      }
    })();
  </script>
</body>
</html>
